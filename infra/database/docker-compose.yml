services:
  postgres:
    image: postgres:16-alpine
    container_name: northstar-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: northstar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d northstar"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - northstar_postgres_data:/var/lib/postgresql/data

volumes:
  northstar_postgres_data:
